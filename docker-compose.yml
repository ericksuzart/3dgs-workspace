# Docker Compose for 3DGS Workspace
#
# USAGE:
#   export DATASET_PATH=/path/to/your/datasets
#   docker compose run --rm training   # Run training
#   docker compose run --rm colmap     # Run COLMAP preprocessing
#   docker compose run --rm inpaint    # Run interactive inpainting
#
# SERVICES:
#   colmap    - COLMAP Structure-from-Motion preprocessing
#   training  - 3D Gaussian Splatting training
#   inpaint   - Interactive 360° image inpainting (tripod/object removal)

services:
  # ──────────────────────────────────────────────────────────────────
  # COLMAP: Structure-from-Motion preprocessing
  # Converts raw images into camera poses + point cloud for 3DGS.
  #
  # Expected input structure:
  #   /dataset/input/        ← Place raw images here
  #
  # Output structure:
  #   /dataset/images/       ← Undistorted images
  #   /dataset/sparse/0/     ← COLMAP sparse reconstruction
  #   /dataset/images_2/     ← 50% resized (if --resize used)
  #   /dataset/images_4/     ← 25% resized (if --resize used)
  #   /dataset/images_8/     ← 12.5% resized (if --resize used)
  # ──────────────────────────────────────────────────────────────────
  colmap:
    build:
      context: ./docker/3dgs-colmap
      dockerfile: Dockerfile
    image: 3dgs-colmap:latest
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - ${DATASET_PATH:-./data}:/dataset:rw
      - .:/workspace:rw
    working_dir: /workspace
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - CONTAINER_MEM=${CONTAINER_MEM:-12g}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    # Override entrypoint to run convert.sh directly
    entrypoint: ["bash", "/usr/local/bin/convert.sh"]
    # Default command (override with: docker compose run colmap -s /dataset --resize)
    command: ["-s", "/dataset"]
    profiles: ["colmap"]

  # ──────────────────────────────────────────────────────────────────
  # TRAINING: 3D Gaussian Splatting
  # Runs the 3DGS training pipeline.
  #
  # Expected input structure:
  #   /dataset/images/       ← Undistorted images
  #   /dataset/sparse/0/     ← COLMAP output
  #
  # Output:
  #   /output/<scene>/       ← Training checkpoints + point clouds
  # ──────────────────────────────────────────────────────────────────
  training:
    build:
      context: ./docker/3dgsworkspace
      dockerfile: Dockerfile
    image: 3dgsworkspace:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - ${DATASET_PATH:-./data}:/dataset:rw
      - ${OUTPUT_PATH:-./output}:/output:rw
    working_dir: /dataset
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - GS_PATH=/opt/gaussian-splatting
      - CONTAINER_MEM=${CONTAINER_MEM:-12g}
    # Default: interactive shell (override to run training)
    # docker compose run training python3 $GS_PATH/train.py -s /dataset
    command: ["sleep", "infinity"]
    profiles: ["training"]

  # ──────────────────────────────────────────────────────────────────
  # INPAINTING: Interactive 360° image cleanup
  # Removes tripods, people, or unwanted objects from equirectangular
  # images using Stable Diffusion 2 or LaMa inpainting.
  #
  # Expected input:
  #   /data/*.jpg            ← Source 360° images
  #
  # Output:
  #   /data/output/*.jpg     ← Inpainted images
  # ──────────────────────────────────────────────────────────────────
  inpaint:
    build:
      context: ./docker/pre-processing
      dockerfile: Dockerfile
    image: lama-inpaint:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - ${DATASET_PATH:-./data}:/data:rw
      - ${MODELS_PATH:-./docker/pre-processing/models}:/models:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DATASET_PATH=/data
      - MODE=${MODE:-full}
      - DILATION_ITER=${DILATION_ITER:-10}
      - BLUR_KERNEL=${BLUR_KERNEL:-21}
      - JPEG_QUALITY=${JPEG_QUALITY:-95}
      - DISPLAY_SCALE=${DISPLAY_SCALE:-0.5}
      - DISPLAY=${DISPLAY:-}
      - INPAINT_BACKEND=${INPAINT_BACKEND:-sd2}
      - CONTAINER_MEM=${CONTAINER_MEM:-12g}
    # X11 forwarding for GUI (Linux)
    # For macOS: set DISPLAY=host.docker.internal:0 before running
    # For WSL2: set DISPLAY=<windows-ip>:0 before running
    profiles: ["inpaint"]
